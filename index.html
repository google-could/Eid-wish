<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak · gentle drift</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body {
    min-height: 100vh;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: #FDC2CD;  /* ← CHANGE THIS LINE */
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    color: #3d1f2b;
}

        /* Full-page overlay for particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        body::after {
            content: '';
            position: absolute;
            width: 80vmin;
            height: 80vmin;
            background: radial-gradient(circle, rgba(255, 220, 235, 0.5) 0%, transparent 70%);
            bottom: -10vmin;
            left: -10vmin;
            z-index: 0;
            pointer-events: none;
        }

        .eid-card {
            position: relative;
            z-index: 20;
            max-width: 580px;
            width: 90%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border-radius: 56px 56px 56px 56px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 35px 70px -10px rgba(220, 120, 140, 0.3),
                        0 0 0 1px rgba(255, 215, 225, 0.5) inset;
            padding: 2rem 2rem 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s ease;
        }

        .top-credit {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            background: rgba(255, 255, 255, 0.4);
            padding: 0.5rem 1.4rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            margin-bottom: 0.75rem;
            font-size: 1rem;
            color: #ac4f6c;
            box-shadow: 0 6px 16px rgba(240, 160, 180, 0.15);
        }

        .top-credit p {
            font-family: 'Caveat', 'Brush Script MT', cursive;
            font-size: 1.5rem;
            font-weight: 400;
            color: #ad4b6b;
        }

        .designer-name {
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: 1.5px;
            background: linear-gradient(
                120deg, 
                #b23e64 0%, 
                #f76c8e 25%, 
                #9c27b0 50%, 
                #2196f3 75%, 
                #b23e64 100%
            );
            background-size: 300% auto; 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 4s linear infinite;
            text-shadow: 0 2px 10px rgba(255, 128, 128, 0.2);
            line-height: 1.2;
            display: inline-block;
        }

        @keyframes flow {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        .heart-duo {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
            margin: 0.5rem 0 0.2rem;
            font-size: 3.2rem;
            filter: drop-shadow(0 8px 16px rgba(245, 120, 140, 0.4));
        }

        .heart-main {
            animation: levitate 3s ease-in-out infinite;
            line-height: 1;
        }

        .heart-second {
            animation: levitate 3.2s ease-in-out infinite reverse;
            line-height: 1;
        }

        @keyframes levitate {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
            100% { transform: translateY(0px) scale(1); }
        }

        h1 {
            font-size: 2.7rem;
            font-weight: 700;
            margin: 0.25rem 0 0.25rem;
            background: linear-gradient(135deg, #832b45, #d45c7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(255, 200, 220, 0.6);
            letter-spacing: -0.01em;
        }

        .lovely-line {
            font-size: 1.2rem;
            font-weight: 300;
            color: #7e4a5c;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            padding: 0.8rem 1.8rem;
            border-radius: 80px;
            max-width: 90%;
            margin: 1rem 0 1.4rem;
            box-shadow: 0 6px 18px rgba(220, 150, 170, 0.15);
            font-style: italic;
            border: 1px solid rgba(255, 210, 225, 0.6);
            line-height: 1.5;
        }

        .gift-presentation {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0.8rem 0 1.5rem;
            min-height: 220px; /* give space for escaping words */
        }

        .gift-box {
            width: 200px;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 20px 30px #fbb0c0);
            animation: soft-wobble 6s infinite ease-in-out;
            z-index: 10;
            display: block;
        }

        /* open box image – initially hidden */
        .open-gift-box {
            width: 200px;
            filter: drop-shadow(0 20px 30px #fbb0c0);
            z-index: 10;
            display: none;
        }

        /* container for words flying out */
        .word-escape-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
.escape-word {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.5rem;
    font-weight: 700;
    white-space: nowrap;
    background: white;
    padding: 10px 25px;
    border-radius: 50px;
    color: #b23e64;
    box-shadow: 0 10px 25px rgba(178, 62, 100, 0.2);
    border: 2px solid #ffd1dc;
    opacity: 0;
    animation: flyOut 1.2s ease-out forwards;
    z-index: 100;
    pointer-events: none;
    text-shadow: none;
}

@keyframes flyOut {
    0% {
        opacity: 0;
        transform: translate(-50%, -40%) scale(0.5);
    }
    15% {
        opacity: 1;
        transform: translate(-50%, -70%) scale(0.9);
    }
    30% {
        opacity: 1;
        transform: translate(-50%, -100%) scale(1.1);
    }
    70% {
        opacity: 1;
        transform: translate(-50%, -150%) scale(1.2);
    }
    85% {
        opacity: 0.8;
        transform: translate(-50%, -180%) scale(1.3);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -220%) scale(1.4);
    }
}
        /* Shake animation for the closed box */
        .shake-box {
            animation: shake 0.2s infinite ease-in-out !important;
        }

        @keyframes shake {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(5deg) scale(1.05); }
            50% { transform: rotate(-5deg) scale(1.1); }
            75% { transform: rotate(3deg) scale(1.05); }
            100% { transform: rotate(0deg) scale(1); }
        }

        @keyframes soft-wobble {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(2deg) scale(1.02); }
            75% { transform: rotate(-2deg) scale(1.02); }
        }

        .unwrap-btn {
            background: linear-gradient(145deg, #f37c96, #f5a3b9);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 1.5px;
            padding: 1.1rem 2rem;
            width: 85%;
            max-width: 380px;
            border-radius: 120px;
            box-shadow: 0 18px 30px -8px rgba(225, 110, 140, 0.5), 0 4px 0 0 #b34d6d inset, 0 -2px 10px rgba(255,255,255,0.6) inset;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            margin-top: 0.5rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 230, 240, 0.7);
        }

        .unwrap-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(145deg, #f68aa5, #fbb0c2);
            box-shadow: 0 22px 35px -6px #e58ca8, 0 3px 0 0 #b34d6d inset;
        }

        .unwrap-btn:active {
            transform: scale(0.98);
            box-shadow: 0 8px 20px -4px #e07094;
        }

        /* Particle styles - full page coverage */
        .particle {
            position: fixed;
            top: -50px;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            animation: fall linear forwards;
            font-size: 1.8rem;
            filter: drop-shadow(0 6px 6px rgba(255, 170, 200, 0.4));
            opacity: 0.9;
            will-change: transform;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.8);
                opacity: 0.8;
            }
            20% { opacity: 1; }
            80% { opacity: 0.8; }
            100% {
                transform: translateY(120vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        #video, #canvas { display: none; }

        @media (max-width: 450px) {
            .eid-card { padding: 1.5rem 1.2rem; border-radius: 40px; }
            h1 { font-size: 2.2rem; }
            .designer-name { font-size: 1.8rem; }
            .heart-duo { font-size: 2.7rem; }
            .lovely-line { font-size: 1rem; padding: 0.6rem 1rem; }
            .unwrap-btn { font-size: 1rem; padding: 0.9rem 1rem; }
            .particle { font-size: 1.4rem; }
            .escape-word { font-size: 1.5rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Caveat:wght@400..700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="eid-card">
        <div class="top-credit">
            <p>designed by</p>
            <span class="designer-name">KABIR</span>
        </div>

        <div class="heart-duo">
            <span class="heart-main">❤️</span>
            <span class="heart-second">🌙</span>
            <span class="heart-main">✨</span>
        </div>

        <h1 id="greeting">Eid Mubarak,<br>Dear Mahnoor!</h1>

        <div class="lovely-line" id="lovelyLine">
            May this beautiful Eid bring endless joy to your heart and magic to your soul.
        </div>

        <div class="gift-presentation" id="giftPresentation">
            <!-- closed box (default) -->
            <img src="https://i.ibb.co/d4nQbGTy/Picsart-26-02-28-15-16-47-443.png" alt="Eid Gift" class="gift-box" id="closedGiftBox">
            <!-- open box image (hidden initially) -->
            <img src="https://i.ibb.co/RG7rfj0j/Picsart-26-03-02-16-41-40-836.png" alt="Open Gift" class="open-gift-box" id="openGiftBox">
            <!-- container for words that fly out -->
            <div class="word-escape-container" id="wordEscapeContainer"></div>
        </div>

        <button class="unwrap-btn" id="unwrapBtn">✨ unwrap your surprise ✨</button>
    </div>

    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        (function() {
            // ---------- FALLING ELEMENTS: ONE BIG BURST, THEN GENTLE BUBBLES+HEARTS ----------
            
            function openingBurst() {
                const allSymbols = ['❤️', '🌟', '💝', '🌹', '🏵️', '🫧', '🍓', '🎁', '✨', '⭐', '🌸', '💫'];
                const burstCount = 70;
                for (let i = 0; i < burstCount; i++) {
                    setTimeout(() => {
                        const burst = document.createElement('div');
                        burst.className = 'particle';
                        burst.innerText = allSymbols[Math.floor(Math.random() * allSymbols.length)];
                        
                        burst.style.left = Math.random() * 100 + '%';
                        burst.style.top = -10 + Math.random() * 30 + 'px';
                        burst.style.fontSize = (18 + Math.random() * 36) + 'px';
                        burst.style.animationDuration = (3 + Math.random() * 5) + 's';
                        burst.style.filter = 'drop-shadow(0 0 15px #ffb6c1) drop-shadow(0 0 8px gold)';
                        burst.style.opacity = '0.95';
                        
                        document.body.appendChild(burst);
                        
                        setTimeout(() => {
                            if (burst.parentNode) burst.remove();
                        }, 8000);
                    }, i * 20);
                }
            }

            function startGentleDrift() {
                const gentleSymbols = ['🫧', '❤️'];
                
                setInterval(() => {
                    const count = Math.random() < 0.3 ? 2 : 1;
                    
                    for (let i = 0; i < count; i++) {
                        const particle = document.createElement('div');
                        particle.className = 'particle';
                        
                        particle.innerText = gentleSymbols[Math.floor(Math.random() * gentleSymbols.length)];
                        
                        particle.style.left = Math.random() * 100 + '%';
                        particle.style.top = -Math.random() * 40 + 'px';
                        
                        const size = 14 + Math.floor(Math.random() * 28);
                        particle.style.fontSize = size + 'px';
                        
                        const duration = 7 + Math.random() * 8;
                        particle.style.animationDuration = duration + 's';
                        
                        particle.style.animationDelay = Math.random() * 3 + 's';
                        
                        particle.style.opacity = 0.5 + Math.random() * 0.3;
                        
                        particle.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
                        
                        document.body.appendChild(particle);
                        
                        setTimeout(() => {
                            if (particle.parentNode) particle.remove();
                        }, (duration + 3) * 1000);
                    }
                }, 1200);
            }

            setTimeout(() => {
                openingBurst();
                setTimeout(startGentleDrift, 1500);
            }, 300);

            // ---------- HANDLE URL NAME ----------
            const urlParams = new URLSearchParams(window.location.search);
            const userName = urlParams.get('name');
            if (userName) {
                document.getElementById('greeting').innerHTML = `Eid Mubarak,<br>${userName}!`;
            }

            // ---------- NEW UNWRAP LOGIC: SHAKE 1.5s → OPEN BOX → WORDS ONE BY ONE ----------
            const unwrapBtn = document.getElementById('unwrapBtn');
            const closedBox = document.getElementById('closedGiftBox');
            const openBox = document.getElementById('openGiftBox');
            const wordContainer = document.getElementById('wordEscapeContainer');
            const lovelyDiv = document.getElementById('lovelyLine');
            const originalLine = lovelyDiv.innerText;

// List of words to appear (exactly as requested)
const words = [
    'Churail 🧟‍♀️',
    'badrangi 👩🏿‍🦱',
    'kherani 🙍🏿‍♀️',
    'tore 🧘🏿‍♀️',
    'his hm nshta...... 🤣🤣'
];

// Function to reset box to closed state
function resetBoxToClosed() {
    // Hide open box, show closed box
    openBox.style.display = 'none';
    closedBox.style.display = 'block';
    
    // Remove any remaining word elements
    const remainingWords = document.querySelectorAll('.escape-word');
    remainingWords.forEach(word => word.remove());
    
    // Reset button text
    unwrapBtn.innerText = '✨ unwrap your surprise ✨';
    unwrapBtn.disabled = false;
    unwrapBtn.style.opacity = '1';
    unwrapBtn.style.cursor = 'pointer';
    
    // Reset opened flag
    isOpened = false;
}
            // Prevent double-trigger
            let isOpened = false;

            unwrapBtn.addEventListener('click', function(e) {
                e.preventDefault();

                if (isOpened) return; // already opened

                // Disable button during animation
                unwrapBtn.disabled = true;
                unwrapBtn.style.opacity = '0.6';
                unwrapBtn.style.cursor = 'default';

                // 1. Add shake animation to closed box
                closedBox.classList.add('shake-box');

                // 2. After 1.5 seconds, stop shake, switch to open box, and show words
                setTimeout(() => {
                    // Remove shake, hide closed box, show open box
                    closedBox.classList.remove('shake-box');
                    closedBox.style.display = 'none';
                    openBox.style.display = 'block';

// 3. Trigger words one by one - each comes fast, stays 0.5 sec, disappears
let wordIndex = 0;

function showNextWord() {
    if (wordIndex >= words.length) {
        // All words finished - close box and reset button
        setTimeout(() => {
            resetBoxToClosed();
        }, 00); // Small delay after last word disappears
        return;
    }
    
    const word = words[wordIndex];
    wordIndex++;
    
    // create flying word
    const wordEl = document.createElement('div');
    wordEl.className = 'escape-word';
    wordEl.innerText = word;
    wordEl.style.animationDuration = '1.2s'; // fast total animation
    
    // Start position slightly above box
    wordEl.style.top = '30%';
    
    // Starting font size
    wordEl.style.fontSize = '1rem';
    
    wordContainer.appendChild(wordEl);

    // remove word after animation completes
    setTimeout(() => {
        if (wordEl.parentNode) wordEl.remove();
    }, 1200);
    
    // Schedule next word
    setTimeout(showNextWord, 1700); // 1.7 seconds between each
}

// Start showing words
showNextWord();
                    // 4. Also add a little burst of particles (keep original style)
                    for (let i = 0; i < 40; i++) {
                        setTimeout(() => {
                            const burst = document.createElement('div');
                            burst.className = 'particle';
                            const burstSymbols = ['❤️', '🌟', '💝', '🌹', '🏵️', '🫧', '🍓', '🎁', '✨', '⭐', '🌸', '💫'];
                            burst.innerText = burstSymbols[Math.floor(Math.random() * burstSymbols.length)];
                            
                            burst.style.left = Math.random() * 100 + '%';
                            burst.style.top = (30 + Math.random() * 50) + '%';
                            burst.style.fontSize = (20 + Math.random() * 40) + 'px';
                            burst.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
                            burst.style.filter = 'drop-shadow(0 0 15px #ffb6c1) drop-shadow(0 0 5px gold)';
                            
                            document.body.appendChild(burst);
                            
                            setTimeout(() => {
                                if (burst.parentNode) burst.remove();
                            }, 3000);
                        }, i * 30);
                    }

                    // 5. Temporarily change lovely line (optional, keeps original style)
                    lovelyDiv.style.transition = 'all 0.3s';
                    lovelyDiv.innerText = '✨ the box is open! ✨';
                    lovelyDiv.style.background = 'rgba(255, 230, 240, 0.7)';
                    lovelyDiv.style.color = '#b34366';
                    
                    setTimeout(() => {
                        lovelyDiv.innerText = originalLine;
                        lovelyDiv.style.background = 'rgba(255, 255, 255, 0.4)';
                        lovelyDiv.style.color = '#7e4a5c';
                    }, 2800);

// Mark as opened
isOpened = true;
// Button will be re-enabled by resetBoxToClosed() after animation ends
                }, 1500); // 1.5 second shake

                // Button text feedback (same as original style)
                const originalText = unwrapBtn.innerText;
                unwrapBtn.innerText = '🎁 shaking...';
                setTimeout(() => {
                    if (!isOpened) {
                        unwrapBtn.innerText = originalText;
                    } else {
                        unwrapBtn.innerText = '✨ opened ✨';
                    }
                }, 1400);
            });

            // Double click on gift still adds sparkles (preserve original behavior, but adapt to open/closed)
            const giftImage = document.querySelector('.gift-box'); // closed box
            const openGift = document.getElementById('openGiftBox');
            
            function addSparkles() {
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        const spark = document.createElement('div');
                        spark.className = 'particle';
                        spark.innerText = ['❤️', '🌟', '💫', '✨'][Math.floor(Math.random() * 4)];
                        spark.style.left = (30 + Math.random() * 40) + '%';
                        spark.style.fontSize = (18 + Math.random() * 28) + 'px';
                        spark.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
                        spark.style.filter = 'drop-shadow(0 0 20px #ffa5c3) drop-shadow(0 0 10px gold)';
                        document.body.appendChild(spark);
                        setTimeout(() => {
                            if (spark.parentNode) spark.remove();
                        }, 3000);
                    }, i * 50);
                }
            }

            // Attach double click to both boxes (whichever visible)
            closedBox.addEventListener('dblclick', addSparkles);
            openBox.addEventListener('dblclick', addSparkles);
        })();
    </script>
</body>
</html>
